name: Windows OTA (Electron)

on:
  push:
    tags:
      - "win-ota-*"

jobs:
  windows-ota:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Build Windows app
        env:
          GH_TOKEN: ${{ secrets.CDN_GITHUB_TOKEN }}
          VITE_STORAGE_FETCH_TOKEN: ${{ secrets.CDN_GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=8192"
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#win-ota-}"
          echo "Setting version to $VERSION"
          npm version $VERSION --no-git-tag-version
          sed -i "s/GH_TOKEN_PLACEHOLDER/${GH_TOKEN}/g" electron/main.cjs
          npm run build
          npx electron-builder --win --publish always
